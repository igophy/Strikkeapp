<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inges strikkehjelp</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <img src="logo.svg" alt="Logo" class="logo">
        <h1>Inges strikkehjelp</h1>
        <p class="subtitle">Din digitale strikkeassistent &middot; v1.1</p>
        <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Bytt mørk/lys modus"></button>
    </header>

    <main>
        <!-- Hjem -->
        <section id="hjem" class="page active">
            <div class="tile-grid">
                <button class="tile" data-page="prosjekter">
                    <span class="tile-icon">🧶</span>
                    <span class="tile-label">Mine prosjekter</span>
                </button>
                <button class="tile" data-page="teller">
                    <span class="tile-icon">123</span>
                    <span class="tile-label">Masketeller</span>
                </button>
                <button class="tile" data-page="oykning">
                    <span class="tile-icon">+</span>
                    <span class="tile-label">Beregn økning</span>
                </button>
                <button class="tile" data-page="felling">
                    <span class="tile-icon">−</span>
                    <span class="tile-label">Beregn felling</span>
                </button>
                <button class="tile" data-page="fasthet">
                    <span class="tile-icon">cm</span>
                    <span class="tile-label">Strikkefasthet</span>
                </button>
                <button class="tile" data-page="garn">
                    <span class="tile-icon">~</span>
                    <span class="tile-label">Garnforbruk</span>
                </button>
                <button class="tile" data-page="garnalternativ">
                    <span class="tile-icon">↔</span>
                    <span class="tile-label">Garnalternativ</span>
                </button>
                <button class="tile" data-page="ekspert">
                    <span class="tile-icon">?</span>
                    <span class="tile-label">Strikkeekspert</span>
                </button>
            </div>
        </section>

        <!-- === NY: Mine prosjekter === -->
        <section id="prosjekter" class="page">
            <button class="btn-back" data-page="hjem">Tilbake</button>
            <h2>Mine prosjekter</h2>
            <button id="nyProsjektBtn" class="btn-calculate">+ Nytt prosjekt</button>
            <div id="prosjektListe" class="prosjekt-liste"></div>
        </section>

        <!-- === NY: Prosjekt detalj === -->
        <section id="prosjektDetalj" class="page">
            <button class="btn-back" data-page="prosjekter">Tilbake til prosjekter</button>
            <h2 id="prosjektTittel">Prosjekt</h2>
            
            <div class="prosjekt-form">
                <div class="form-group">
                    <label>Navn</label>
                    <input type="text" id="prosjektNavn" placeholder="F.eks. Blå genser">
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="prosjektType">
                        <option value="genser">Genser</option>
                        <option value="lue">Lue</option>
                        <option value="sokker">Sokker</option>
                        <option value="votter">Votter</option>
                        <option value="sjal">Sjal</option>
                        <option value="annet">Annet</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="prosjektStatus">
                        <option value="påbegynt">Påbegynt</option>
                        <option value="pause">Pause</option>
                        <option value="ferdig">Ferdig</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Masker nå</label>
                    <input type="number" id="prosjektMasker" value="0">
                </div>
                <div class="form-group">
                    <label>Rader nå</label>
                    <input type="number" id="prosjektRader" value="0">
                </div>
                <div class="form-group">
                    <label>Notater</label>
                    <textarea id="prosjektNotater" rows="3" placeholder="Garn, oppskrift, tips..."></textarea>
                </div>
            </div>

            <button id="lagreProsjektBtn" class="btn-calculate">Lagre prosjekt</button>
            <button id="slettProsjektBtn" class="btn-reset" style="margin-top:0.5rem;background:#c0392b;color:white;">Slett prosjekt</button>
        </section>

        <!-- Masketeller (liten oppdatering) -->
        <section id="teller" class="page">
            <button class="btn-back" data-page="hjem">Tilbake</button>
            <h2>Masketeller</h2>
            <p id="aktivProsjektNavn" class="description">Ingen prosjekt valgt</p>

            <div class="counter-group">
                <div class="counter">
                    <label>Masker</label>
                    <div class="counter-controls">
                        <button class="btn-counter btn-minus" data-target="masker">-</button>
                        <span id="masker" class="counter-value">0</span>
                        <button class="btn-counter btn-plus" data-target="masker">+</button>
                    </div>
                </div>
                <div class="counter">
                    <label>Rader</label>
                    <div class="counter-controls">
                        <button class="btn-counter btn-minus" data-target="rader">-</button>
                        <span id="rader" class="counter-value">0</span>
                        <button class="btn-counter btn-plus" data-target="rader">+</button>
                    </div>
                </div>
            </div>

            <button class="btn-reset" id="resetCounters">Nullstill tellere</button>
        </section>

        <!-- De andre sidene (oykning, felling, fasthet, garn, garnalternativ, ekspert) er uendret -->
        <!-- Behold alle de andre <section id="..."> som du allerede hadde -->

    </main>

    <footer>
        <p>Inges strikkehjelp &mdash; God strikking!</p>
        <p class="version">v1.1 • Prosjektsporing</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
